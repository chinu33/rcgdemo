ills)","children":[],"payload":{"tag":"li","lines":"73,74"}},{"content":"Customer voice &#x2014; recent reviews + sentiment delta","children":[],"payload":{"tag":"li","lines":"74,75"}}],"payload":{"tag":"h3","lines":"69,70"}},{"content":"Analytics tab","children":[{"content":"90-day daily revenue trend (with disruption dip story)","children":[],"payload":{"tag":"li","lines":"76,77"}},{"content":"30-day category trajectories &#x2014; 10 categories","children":[],"payload":{"tag":"li","lines":"77,78"}},{"content":"Agent activity ramp + cost/latency breakdown","children":[],"payload":{"tag":"li","lines":"78,79"}},{"content":"90-day disruption response history + minutes-to-response","children":[],"payload":{"tag":"li","lines":"79,80"}},{"content":"Live SQLite stats strip &#x2014; tables, rows, schema visible","children":[],"payload":{"tag":"li","lines":"80,82"}}],"payload":{"tag":"h3","lines":"75,76"}}],"payload":{"tag":"h2","lines":"68,69"}},{"content":"&#x1f916; AI &amp; Intelligence Layer","children":[{"content":"LLM","children":[{"content":"<strong>Google Gemini 2.5 Pro</strong> (configurable model)","children":[],"payload":{"tag":"li","lines":"84,85"}},{"content":"Token-level streaming via the Gemini async API","children":[],"payload":{"tag":"li","lines":"85,86"}},{"content":"Pricing knobs in <code>.env</code> for live &#x24;/run calculation","children":[],"payload":{"tag":"li","lines":"86,87"}}],"payload":{"tag":"h3","lines":"83,84"}},{"content":"Orchestration","children":[{"content":"<strong>LangChain</strong> primitives (<code>ChatGoogleGenerativeAI</code>, messages, <code>bind_tools</code>)","children":[],"payload":{"tag":"li","lines":"88,89"}},{"content":"<strong>LangGraph</strong> <code>StateGraph</code> per workflow","children":[],"payload":{"tag":"li","lines":"89,90"}},{"content":"Parallel fan-out with <code>asyncio.wait</code> + WS-friendly event queue","children":[],"payload":{"tag":"li","lines":"90,91"}},{"content":"<strong>Two LLM calls per specialist</
